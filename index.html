<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Advisory Hub — Team</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--navy:#0A1628;--teal:#1D9E75;--teal-d:#0F6E56;--teal-m:#5DCAA5;--teal-l:#E1F5EE;--white:#fff;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;--amber:#D97706;--amberL:#FFFBEB;--amberB:#FDE68A;--red:#DC2626;--redL:#FEF2F2;--redB:#FECACA;--blue:#2563EB;--blueL:#EFF6FF;--blueB:#BFDBFE;--purple:#7C3AED;--purpleL:#F5F3FF;--purpleB:#DDD6FE;--pink:#DB2777;--pinkL:#FDF2F8;--pinkB:#FBCFE8;--rsm:6px;--rmd:8px;--rlg:12px;--rxl:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;color:var(--g800);background:var(--g50);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sb{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-mark{display:flex;align-items:center;gap:9px}
.sb-icon{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center}
.sb-icon i{font-size:17px;color:#fff}
.sb-txt{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:#fff;line-height:1.1}
.sb-sub2{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.04em;margin-top:1px}
.sb-nav{flex:1;padding:10px 6px;display:flex;flex-direction:column;gap:2px}
.sb-sect{font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.25);text-transform:uppercase;padding:9px 8px 3px;margin-top:4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rmd);cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.ni.active{background:var(--teal);color:#fff;font-weight:500}
.ni i{font-size:16px;flex-shrink:0}
.ni .nb{margin-left:auto;background:rgba(255,255,255,.13);font-size:10px;padding:1px 6px;border-radius:20px}
.ni.active .nb{background:rgba(255,255,255,.22)}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:auto}
.sb-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.18);line-height:1.5}
/* Main */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.ph{background:#fff;border-bottom:1px solid var(--g200);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph-l{}.ph-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--g900)}
.ph-sub{font-size:11px;color:var(--g400);margin-top:1px}
.ph-r{display:flex;align-items:center;gap:9px}
.pb{padding:24px 26px;flex:1}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rmd);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap;line-height:1}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-p:hover{background:var(--teal-d)}
.btn-s{background:#fff;color:var(--g700);border-color:var(--g300)}
.btn-s:hover{background:var(--g50)}
.btn-g{background:transparent;color:var(--g500);border:none}
.btn-g:hover{color:var(--g800)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:14px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
/* Cards */
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:18px}
/* Forms */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px}
.opt{font-weight:400;color:var(--g400)}
input[type=text],input[type=password],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--g300);border-radius:var(--rmd);font-size:13px;font-family:inherit;color:var(--g700);background:#fff;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sc{border:1.5px solid var(--g200);border-radius:var(--rmd);padding:11px;cursor:pointer;transition:all .15s}
.sc:hover{border-color:var(--teal)}
.sc.sel{border-color:var(--teal);background:var(--teal-l)}
.sc .sl{font-weight:500;font-size:13px;color:var(--g800)}
.sc .sd{font-size:11px;color:var(--g400);margin-top:1px}
.sc.sel .sl{color:var(--teal-d)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ci{display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--g200);border-radius:var(--rmd);cursor:pointer;font-size:12px;color:var(--g600);transition:all .15s}
.ci:hover{border-color:var(--teal)}
.ci.ck{background:var(--teal-l);border-color:var(--teal);color:var(--g800)}
.ci input{accent-color:var(--teal);width:13px;height:13px;flex-shrink:0}
/* Badges */
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.bh{background:var(--redL);color:var(--red)}.bm{background:var(--amberL);color:var(--amber)}.bl{background:var(--teal-l);color:var(--teal-d)}.bn{background:var(--g100);color:var(--g500)}.bi{background:var(--blueL);color:var(--blue)}.bt{background:var(--teal-l);color:var(--teal-d)}.bp{background:var(--purpleL);color:var(--purple)}.bpk{background:var(--pinkL);color:var(--pink)}
/* Loading */
.loading{text-align:center;padding:60px 20px}
.spinner{width:40px;height:40px;border:2.5px solid var(--g200);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.l-t{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--g800);margin-bottom:5px}
.l-m{font-size:13px;color:var(--g400);min-height:20px}
/* Error */
.err{background:var(--redL);border:1px solid var(--redB);border-radius:var(--rmd);padding:10px 13px;font-size:13px;color:var(--red);display:flex;align-items:flex-start;gap:6px;margin-bottom:12px}
/* Wiz */
.ww{max-width:640px;margin:0 auto}
.wbody{background:#fff;border:1px solid var(--g200);border-radius:var(--rxl);padding:26px}
.wiz-t{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;color:var(--g900);margin-bottom:5px}
.wiz-s{font-size:13px;color:var(--g500);line-height:1.6;margin-bottom:20px}
.wfoot{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--g100)}
/* Results */
.res-hdr{border-radius:var(--rxl);padding:20px 24px;margin-bottom:16px;color:#fff}
.res-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;background:rgba(255,255,255,.2);color:#fff;padding:3px 9px;border-radius:20px;margin-bottom:7px}
.res-title{font-family:'Sora',sans-serif;font-size:19px;font-weight:600;margin-bottom:6px}
.res-sum{font-size:13px;color:rgba(255,255,255,.7);line-height:1.7}
.sec-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--g400);margin-bottom:9px}
.result-card{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:15px 17px;margin-bottom:9px}
.rc-title{font-weight:600;font-size:14px;color:var(--g900);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.rc-title i{font-size:16px}
.rc-body{font-size:13px;color:var(--g500);line-height:1.6}
.rc-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--g400);margin-top:8px}
.rc-meta span{display:flex;align-items:center;gap:3px}
/* Prompt result */
.pcat{margin-bottom:20px}
.pcat-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--g800);margin-bottom:9px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--g100);padding-bottom:8px}
.pcat-title i{font-size:17px}
.pcrd{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:14px;margin-bottom:8px}
.pcrd-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:5px}
.pcrd-name{font-weight:600;font-size:13px;color:var(--g800)}
.pcrd-when{font-size:11px;color:var(--g400);margin-bottom:7px}
.pcrd-text{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rmd);padding:10px;font-size:12px;font-family:'SF Mono',Consolas,monospace;line-height:1.7;color:var(--g600);white-space:pre-wrap;word-break:break-word;max-height:130px;overflow-y:auto}
.pcrd-note{font-size:11px;color:var(--teal-d);margin-top:7px;padding:6px 9px;background:var(--teal-l);border-radius:var(--rmd)}
/* Score */
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.score-lbl{font-size:12px;color:var(--g500);min-width:140px}
.sbar{flex:1;height:6px;background:var(--g100);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.score-n{font-size:13px;font-weight:600;min-width:28px;text-align:right}
/* Risk */
.risk{background:#fff;border:1px solid var(--g200);border-left:3px solid var(--g300);border-radius:var(--rmd);padding:13px 15px;margin-bottom:8px}
.risk.Critical,.risk.High{border-left-color:var(--red)}.risk.Medium{border-left-color:var(--amber)}.risk.Low{border-left-color:var(--teal)}
.risk-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.risk-title{font-weight:600;font-size:13px;color:var(--g800)}
.risk-desc{font-size:13px;color:var(--g500);line-height:1.5;margin-bottom:8px}
.risk-rec{font-size:12px;color:var(--teal-d);display:flex;align-items:flex-start;gap:5px;background:var(--teal-l);padding:8px 10px;border-radius:var(--rmd)}
/* Hub */
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:26px}
.hub-card{background:#fff;border:1px solid var(--g200);border-radius:var(--rxl);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hub-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.hub-card.c0::after{background:var(--teal)}.hub-card.c1::after{background:var(--purple)}.hub-card.c2::after{background:var(--amber)}.hub-card.c3::after{background:var(--red)}.hub-card.c4::after{background:var(--blue)}.hub-card.c5::after{background:#0891B2}
.hub-card:hover{border-color:var(--g300);box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px)}
.hub-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:22px}
.hub-icon.c0{background:var(--teal-l);color:var(--teal)}.hub-icon.c1{background:var(--purpleL);color:var(--purple)}.hub-icon.c2{background:var(--amberL);color:var(--amber)}.hub-icon.c3{background:var(--redL);color:var(--red)}.hub-icon.c4{background:var(--blueL);color:var(--blue)}.hub-icon.c5{background:#E0F2FE;color:#0891B2}
.hub-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--g900);margin-bottom:5px}
.hub-desc{font-size:12px;color:var(--g500);line-height:1.6;margin-bottom:13px}
.hub-out{font-size:11px;font-weight:500;color:var(--g400);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.hub-tags{display:flex;flex-wrap:wrap;gap:4px}
.hub-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--g50);color:var(--g500);border:1px solid var(--g200)}
.hub-last{font-size:11px;color:var(--g400);margin-top:12px;padding-top:10px;border-top:1px solid var(--g100);display:flex;align-items:center;gap:5px}
/* JD */
.jd-item{border:1px solid var(--g200);border-radius:var(--rlg);overflow:hidden;margin-bottom:8px}
.jd-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--g50);border-bottom:1px solid var(--g200)}
.jd-role{font-size:13px;font-weight:500;color:var(--g800)}
.jd-dept{font-size:11px;color:var(--g400)}
.jd-bd{padding:9px 13px;font-size:12px;color:var(--g500);max-height:100px;overflow-y:auto;background:#fff;white-space:pre-wrap;line-height:1.5}
.add-jd{border:2px dashed var(--g200);border-radius:var(--rlg);padding:15px;text-align:center;cursor:pointer;transition:all .15s;color:var(--g400);font-size:13px}
.add-jd:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}
.jd-form{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rlg);padding:14px;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
/* Setup */
.setup-wrap{max-width:440px;margin:50px auto}
.setup-card{background:#fff;border:1px solid var(--g200);border-radius:var(--rxl);padding:34px;text-align:center}
.setup-ico{width:54px;height:54px;background:var(--teal-l);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.setup-ico i{font-size:26px;color:var(--teal)}
.setup-t{font-family:'Sora',sans-serif;font-size:20px;font-weight:600;color:var(--g900);margin-bottom:6px}
.setup-s{font-size:13px;color:var(--g500);line-height:1.6;margin-bottom:22px}
.setup-note{font-size:12px;color:var(--g400);line-height:1.6;margin:12px 0 18px}
.setup-note a{color:var(--teal);text-decoration:none}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--g200);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--g500);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab:hover{color:var(--g700)}.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}
.tab i{font-size:14px}
/* Metrics */
.met-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.met{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:14px;border-left:3px solid var(--g200)}
.met.t{border-left-color:var(--teal)}.met.a{border-left-color:var(--amber)}.met.r{border-left-color:var(--red)}.met.b{border-left-color:var(--blue)}.met.p{border-left-color:var(--purple)}
.met-lbl{font-size:11px;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.met-val{font-family:'Sora',sans-serif;font-size:24px;font-weight:600;color:var(--g900);line-height:1}
.met-s{font-size:11px;color:var(--g400);margin-top:2px}
/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--g400)}
.empty i{font-size:42px;margin-bottom:10px;display:block;color:var(--g300)}
.empty p{font-size:13px;line-height:1.6}
/* Chain */
.chain-tip{background:linear-gradient(135deg,var(--teal-l),var(--blueL));border:1px solid var(--teal-m);border-radius:var(--rlg);padding:14px 17px;margin-bottom:22px;display:flex;gap:11px;align-items:flex-start}
.chain-tip i{font-size:18px;color:var(--teal);flex-shrink:0;margin-top:2px}
.chain-tip-t{font-size:13px;font-weight:500;color:var(--teal-d);margin-bottom:3px}
.chain-tip-s{font-size:12px;color:var(--g500);line-height:1.5}
/* Info */
.info-box{background:var(--blueL);border:1px solid var(--blueB);border-radius:var(--rmd);padding:10px 13px;font-size:12px;color:var(--blue);display:flex;gap:7px;align-items:flex-start;margin-bottom:12px}
.info-box i{font-size:15px;flex-shrink:0;margin-top:1px}
/* Settings */
.sc2{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:20px;margin-bottom:14px;max-width:560px}
.sc2 h3{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--g800);margin-bottom:4px}
.sc2 p{font-size:13px;color:var(--g500);line-height:1.6;margin-bottom:12px}
.self-box{background:var(--teal-l);border:1px solid var(--teal-m);border-radius:var(--rlg);padding:16px 18px;margin-bottom:14px;max-width:560px}
.self-box h3{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--teal-d);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.self-box h3 i{font-size:16px}
.self-box ol{font-size:12px;color:var(--teal-d);padding-left:18px;line-height:1.9;opacity:.85}
/* Team styles */
.team-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.member-card{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.member-card:hover{border-color:var(--teal);background:var(--teal-l)}
.member-card.selected{border-color:var(--teal);background:var(--teal-l)}
.member-info{flex:1}
.member-name{font-size:13px;font-weight:500;color:var(--g800)}
.member-role{font-size:11px;color:var(--g400)}
.activity-row{background:#fff;border:1px solid var(--g200);border-radius:var(--rlg);padding:12px 15px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.activity-row:hover{border-color:var(--g300)}
.who-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.admin-banner{background:var(--navy);border-radius:var(--rlg);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;color:#fff}
.admin-banner i{font-size:20px;color:var(--teal-m);flex-shrink:0}
.admin-banner-t{font-size:13px;font-weight:500;margin-bottom:2px}
.admin-banner-s{font-size:12px;color:rgba(255,255,255,.45)}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g400)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 12px;border:1px solid var(--g200);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:var(--g500);transition:all .15s;font-family:inherit}
.filter-btn:hover{border-color:var(--teal);color:var(--teal)}
.filter-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.setup-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--g100)}
.setup-step:last-child{border-bottom:none}
.step-circle{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Sora',sans-serif}
.step-content{flex:1}
.step-title{font-size:13px;font-weight:500;color:var(--g800);margin-bottom:2px}
.step-desc{font-size:12px;color:var(--g500);line-height:1.6}
.code-block{background:var(--g900);color:#7dd3b0;font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:12px;border-radius:var(--rmd);margin-top:8px;line-height:1.8;white-space:pre;overflow-x:auto}

/* ==================== AI PROVIDER ==================== */
const PROVIDERS = {
  anthropic: { name:'Anthropic Claude', tag:'Claude Sonnet', color:'#1D9E75', free:false, keyPlaceholder:'sk-ant-...', keyLabel:'Anthropic API Key', keyLink:'https://console.anthropic.com', keyLinkText:'console.anthropic.com → API Keys' },

  openai:    { name:'OpenAI',           tag:'GPT-4o Mini',   color:'#10A37F', free:false, keyPlaceholder:'sk-...', keyLabel:'OpenAI API Key', keyLink:'https://platform.openai.com/api-keys', keyLinkText:'platform.openai.com → API Keys' }

function hasAIKey(){
  const p=DB.provider;
  if(p==='anthropic') return !!DB.key;
  if(p==='gemini')    return !!DB.geminiKey;
  if(p==='openai')    return !!DB.openaiKey;
  return false;
}

function getActiveKey(){
  const p=DB.provider;
  if(p==='anthropic') return DB.key;
  if(p==='gemini')    return DB.geminiKey;
  if(p==='openai')    return DB.openaiKey;
  return '';
}

async function callAI(systemPrompt, userPrompt){
  const p=DB.provider;
  if(p==='anthropic'){
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':DB.key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5000,system:systemPrompt,messages:[{role:'user',content:userPrompt}]})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message||'Anthropic API error');
    return (data.content||[]).map(b=>b.text||'').join('');
  }
  if(p==='gemini'){
    const model='gemini-2.0-flash';
    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${DB.geminiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:systemPrompt}]},
        contents:[{role:'user',parts:[{text:userPrompt}]}],
        generationConfig:{maxOutputTokens:8192,temperature:0.7}
      })
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message||'Gemini API error');
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text) throw new Error('Gemini returned no content. Check your API key and try again.');
    return text;
  }
  if(p==='openai'){
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${DB.openaiKey}`},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:4096,messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}]})
    });
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message||'OpenAI API error');
    return data.choices?.[0]?.message?.content||'';
  }
  throw new Error('No AI provider configured. Go to Settings to set up a provider.');
}

function initSupabase(){
  let url = localStorage.getItem('hub_sb_url')||'';
  const key = localStorage.getItem('hub_sb_anon')||'';
  if(!url || !key || url==='skip') return false;
  // If user pasted a Supabase dashboard URL instead of project URL, auto-fix it
  if(url.includes('supabase.com/dashboard/project/')){
    const ref=url.split('/project/')[1]?.split('/')[0];
    if(ref){ url='https://'+ref+'.supabase.co'; localStorage.setItem('hub_sb_url',url); }
  }
  if(window.supabase){
    supabaseClient = window.supabase.createClient(url, key);
    return true;
  }
  return false;
}

const DB = {
  get key(){ return localStorage.getItem('hub_key')||'' },
  set key(v){ localStorage.setItem('hub_key',v) },
  get provider(){ return localStorage.getItem('hub_provider')||'anthropic' },
  set provider(v){ localStorage.setItem('hub_provider',v) },
  get geminiKey(){ return localStorage.getItem('hub_gemini_key')||'' },
  set geminiKey(v){ localStorage.setItem('hub_gemini_key',v) },
  get openaiKey(){ return localStorage.getItem('hub_openai_key')||'' },
  set openaiKey(v){ localStorage.setItem('hub_openai_key',v) },
  get sbUrl(){ return localStorage.getItem('hub_sb_url')||'' },
  set sbUrl(v){ localStorage.setItem('hub_sb_url',v) },
  get sbAnon(){ return localStorage.getItem('hub_sb_anon')||'' },
  set sbAnon(v){ localStorage.setItem('hub_sb_anon',v) },
  get currentUser(){ return localStorage.getItem('hub_user')||'' },
  set currentUser(v){ localStorage.setItem('hub_user',v) },
  get isAdmin(){ const m=getTeamMembers().find(t=>t.name===this.currentUser); return m?.admin||false; },
  // Local cache fallback
  get results(){ try{ return JSON.parse(localStorage.getItem('hub_results')||'{}') }catch(e){ return {} } },
  setResult(agent,data){ const r=this.results; r[agent]=data; localStorage.setItem('hub_results',JSON.stringify(r)) },
  getResult(agent){ return this.results[agent]||null },
  // Supabase methods
  async saveAssessment(agentId, agentName, orgName, industry, size, aiStage, runBy, results, inputData){
    this.setResult(agentId, {data:results,orgName,industry,size,aiStage,date:new Date().toISOString()});
    if(!supabaseClient) return {error:'No Supabase connection'};
    try{
      const {data,error} = await supabaseClient.from('assessments').insert([{
        agent_id:agentId, agent_name:agentName, org_name:orgName||'',
        industry:industry||'', size:size||'', ai_stage:aiStage||'',
        run_by:runBy||'Unknown', results, input_data:inputData||{}
      }]).select();
      return {data,error};
    }catch(e){ return {error:e.message}; }
  },
  async loadTeamHistory(filters={}){
    if(!supabaseClient) return [];
    try{
      let q = supabaseClient.from('assessments').select('*').order('created_at',{ascending:false}).limit(100);
      if(filters.agentId) q=q.eq('agent_id',filters.agentId);
      if(filters.runBy) q=q.eq('run_by',filters.runBy);
      if(filters.orgName) q=q.ilike('org_name','%'+filters.orgName+'%');
      const {data,error}=await q;
      return error?[]:data||[];
    }catch(e){ return []; }
  },
  async deleteAssessment(id){
    if(!supabaseClient) return;
    await supabaseClient.from('assessments').delete().eq('id',id);
  },
  async getTeamStats(){
    if(!supabaseClient) return null;
    try{
      const {data}=await supabaseClient.from('assessments').select('agent_id,run_by,org_name,created_at');
      return data||[];
    }catch(e){ return []; }
  }
};

function go(v,id){
  view=v; agentId=id||null; errMsg=null;

  const el=document.getElementById('nav-'+v); if(el) el.classList.add('active');

}

function render(){
  const body=document.getElementById('pageBody');
  const title=document.getElementById('phTitle');
  const sub=document.getElementById('phSub');
  const right=document.getElementById('phRight');
  const whoBar=document.getElementById('whoBar');
  const whoName=document.getElementById('whoName');
  right.innerHTML='';
  if(!hasAIKey()||!DB.sbUrl){ title.textContent='Setup'; sub.textContent='Connect your team workspace'; if(whoBar) whoBar.style.display='none'; body.innerHTML=renderSetup(); return; }
  if(!DB.currentUser){ title.textContent='Who are you?'; sub.textContent='Select your name'; if(whoBar) whoBar.style.display='none'; body.innerHTML=renderWhoAreYou(); return; }
  if(whoBar){ whoBar.style.display='flex'; if(whoName) whoName.textContent=DB.currentUser; updateSyncStatus(); }
  const viewRenders = {
    hub:      ()=>{ title.textContent='Agent Hub'; sub.textContent='Select an agent below to get started'; body.innerHTML=renderHub(); },
    teamdash: ()=>{ title.textContent='Team Dashboard'; sub.textContent='All results across agents, organizations, and team members'; right.innerHTML='<button class="btn btn-s btn-sm" onclick="loadHistory()"><i class="ti ti-refresh"></i> Refresh</button>'; body.innerHTML=renderTeamDashboard(); },
    history:  ()=>{ title.textContent='Activity Feed'; sub.textContent='All agent runs in chronological order'; right.innerHTML='<button class="btn btn-s btn-sm" onclick="loadHistory()"><i class="ti ti-refresh"></i> Refresh</button>'; body.innerHTML=renderHistory(); },
    settings: ()=>{ title.textContent='Settings'; sub.textContent='Workspace configuration'; body.innerHTML=renderSettings(); }
  };
  if(viewRenders[view]){
    try{ viewRenders[view](); }
    catch(e){ body.innerHTML='<div class="err"><i class="ti ti-alert-circle"></i>Render error in '+view+': '+e.message+'<br><small>'+e.stack+'</small></div>'; console.error('Render error:',e); }
    return;
  }
  const ag=AGENTS.find(a=>a.id===view);
  if(!ag){ body.innerHTML='<p>Not found.</p>'; return; }
  if(!agentState[view]) agentState[view]=defaultState(view);
  const s=agentState[view];
  title.textContent=ag.name; sub.textContent=ag.desc;
  if(s.result){ right.innerHTML=`<button class="btn btn-s btn-sm" onclick="exportResult('${view}')"><i class="ti ti-download"></i> Export</button><button class="btn btn-s btn-sm" onclick="printResult()"><i class="ti ti-printer"></i> PDF</button><button class="btn btn-g btn-sm" onclick="resetAgent('${view}')"><i class="ti ti-refresh"></i> New Run</button>`; }
  if(s.loading){ body.innerHTML=renderLoading(view); return; }
  if(s.result){ body.innerHTML=renderResult(view,s.result,ag); return; }
  body.innerHTML=renderWizard(view,s,ag);
}

  const agColors={assess:'var(--teal)',prompts:'var(--purple)',govern:'var(--amber)',agents:'var(--red)',roadmap:'var(--blue)'};

    <span style="margin-left:6px;font-size:12px;color:var(--g500)">Agent:</span>
    <button class="filter-btn ${!historyFilter.agentId?'active':''}" onclick="setFilter('agentId',null)">All</button>
    ${agTypes.map(a=>`<button class="filter-btn ${historyFilter.agentId===a?'active':''}" onclick="setFilter('agentId','${a}')">${AGENTS.find(ag=>ag.id===a)?.name.replace(' Agent','').replace(' Recommender','')||a}</button>`).join('')}

  ${prefill}

  </div></div>
  <div class="fg"><label class="fl">Key departments <span class="opt">(optional)</span></label><input type="text" id="f-departments" value="${esc(s.departments)}" placeholder="e.g. Finance, HR, Operations..."></div>
  <div class="fg"><label class="fl">Pain points <span class="opt">(select all that apply)</span></label><div class="cgrid">${PAIN_POINTS.map(p=>`<label class="ci ${s.painPoints.includes(p)?'ck':''}"><input type="checkbox" ${s.painPoints.includes(p)?'checked':''} onchange="toggleArr('${vid}','painPoints','${esc(p)}')">${esc(p)}</label>`).join('')}</div></div>
  <div class="fg"><label class="fl">Regulatory areas <span class="opt">(select all)</span></label><div class="cgrid">${REGS.map(r=>`<label class="ci ${s.regulations.includes(r)?'ck':''}"><input type="checkbox" ${s.regulations.includes(r)?'checked':''} onchange="toggleArr('${vid}','regulations','${esc(r)}')">${esc(r)}</label>`).join('')}</div></div>

/* ==================== RESULTS ==================== */
const COLORS = {assess:'#1D9E75',prompts:'#7C3AED',govern:'#D97706',agents:'#DC2626',roadmap:'#2563EB'};

function renderResult(vid, stored, ag){
  const r = stored.data;
  const color = COLORS[vid]||'#1D9E75';
  let content = '';
  if(vid==='assess') content = renderAssessResult(r);
  else if(vid==='prompts') content = renderPromptsResult(r);
  else if(vid==='govern') content = renderGovernResult(r);
  else if(vid==='agents') content = renderAgentsResult(r);
  else if(vid==='roadmap') content = renderRoadmapResult(r);
  else if(vid==='builder') content = renderBuilderResult(r);

  return `
  <div class="res-hdr" style="background:${color}">
    <div class="res-tag">${ag.name}</div>
    <div class="res-title">${esc(stored.orgName||stored.industry||'Organization')} — ${ag.name.replace(' Agent','').replace(' Recommender','')}</div>
    <div class="res-sum">${esc(r.org_summary||r.portfolio_summary||r.roadmap_summary||r.governance_summary||r.overview||'')}</div>
  </div>
  ${content}`;
}

/* --- Assessment --- */
function renderAssessResult(r){
  const s=r.readiness_scores||{};
  const dims=[{k:'data_maturity',l:'Data Maturity'},{k:'governance_maturity',l:'Governance'},{k:'process_maturity',l:'Process Maturity'},{k:'ai_maturity',l:'AI Maturity'},{k:'workforce_readiness',l:'Workforce Readiness'}];
  const c=(v)=>v>=75?'#1D9E75':v>=50?'#D97706':'#DC2626';
  return `
  <div class="result-card">
    <div style="display:flex;align-items:center;gap:18px">
      <div style="text-align:center"><div style="font-family:'Sora',sans-serif;font-size:46px;font-weight:700;color:${c(s.overall||0)};line-height:1">${s.overall||0}</div><div style="font-size:11px;color:var(--g400)">Overall Score / 100</div></div>
      <div style="flex:1;font-size:13px;color:var(--g500);line-height:1.6">${esc(s.score_rationale||'')}</div>
    </div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:7px">
    ${dims.map(d=>{const v=s[d.k]||0;return `<div class="score-row"><div class="score-lbl">${d.l}</div><div class="sbar"><div class="sbar-fill" style="width:${v}%;background:${c(v)}"></div></div><div class="score-n" style="color:${c(v)}">${v}</div></div>`;}).join('')}
    </div>
  </div>
  ${renderSection('Key Strengths','ti-thumb-up',(r.key_strengths||[]).map(s=>`<div class="result-card" style="padding:10px 14px"><div class="rc-body">${esc(s)}</div></div>`).join(''))}
  ${renderSection('Key Gaps','ti-alert-triangle',(r.key_gaps||[]).map(s=>`<div class="result-card" style="padding:10px 14px;border-left:3px solid var(--red)"><div class="rc-body">${esc(s)}</div></div>`).join(''))}
  ${renderSection('Priority Focus Areas','ti-target',(r.priority_focus_areas||[]).map(f=>`<div class="result-card"><div class="rc-title"><span class="badge ${f.impact==='High'?'bh':f.impact==='Medium'?'bm':'bl'}">${f.impact}</span>${esc(f.area)}</div><div class="rc-body">${esc(f.why)}</div></div>`).join(''))}`;
}

/* --- Prompts --- */
function renderPromptsResult(r){
  let cats = '';
  (r.categories||[]).forEach(cat=>{
    cats += `<div class="pcat">
    <div class="pcat-title"><span>${cat.icon_suggestion||'📌'}</span>${esc(cat.category)}</div>
    ${(cat.prompts||[]).map((p,i)=>{
      const pid=`pp_${cat.category.replace(/\W/g,'')}_${i}`;
      return `<div class="pcrd">
        <div class="pcrd-hd"><div><div class="pcrd-name">${esc(p.name)}</div><div class="pcrd-when">${esc(p.when_to_use)}</div></div>
        <div style="display:flex;gap:6px;align-items:center"><span class="badge bn">${p.complexity}</span><button class="btn btn-s btn-sm" onclick="copyEl('${pid}')"><i class="ti ti-copy"></i> Copy</button></div>
        </div>
        <div class="pcrd-text" id="${pid}">${esc(p.prompt_text)}</div>
        ${p.pro_tip?`<div class="pcrd-note"><i class="ti ti-bulb" style="font-size:12px"></i> ${esc(p.pro_tip)}</div>`:''}
      </div>`;
    }).join('')}
    </div>`;
  });

  const globalPrompts = (r.global_system_prompts||[]).map((p,i)=>{
    const pid=`gp_${i}`;
    return `<div class="pcrd">
      <div class="pcrd-hd"><div><div class="pcrd-name">${esc(p.name)}</div><div class="pcrd-when">Use as: ${esc(p.when_to_use)}</div></div>
      <div style="display:flex;gap:6px;align-items:center"><span class="badge bp">${p.complexity}</span><button class="btn btn-s btn-sm" onclick="copyEl('${pid}')"><i class="ti ti-copy"></i> Copy</button></div>
      </div>
      <div class="pcrd-text" id="${pid}">${esc(p.prompt_text)}</div>
    </div>`;
  }).join('');

  const quickWins = (r.quick_wins||[]).map((p,i)=>{
    const pid=`qw_${i}`;
    return `<div class="pcrd">
      <div class="pcrd-hd"><div><div class="pcrd-name">${esc(p.name)}</div><div class="pcrd-when">⚡ ${esc(p.time_to_value)}</div></div>
      <button class="btn btn-s btn-sm" onclick="copyEl('${pid}')"><i class="ti ti-copy"></i> Copy</button></div>
      <div class="pcrd-text" id="${pid}">${esc(p.prompt_text)}</div>
    </div>`;
  }).join('');

  const hygiene = (r.prompt_hygiene_tips||[]).map(t=>`<div class="result-card" style="padding:10px 14px"><div class="rc-body">${esc(t)}</div></div>`).join('');

  return `
  ${globalPrompts?renderSection('Global System Prompts','ti-settings',globalPrompts):''}
  ${renderSection('Quick Wins — Use Today','ti-bolt',quickWins)}
  ${cats}
  ${hygiene?renderSection('Prompt Hygiene Tips','ti-bulb',hygiene):''}`;
}

/* --- Governance --- */

  const sc=r.governance_score||0;

  const risks=(r.risk_register||[]).map(rk=>`<div class="risk ${rk.severity}">
    <div class="risk-top"><span class="badge ${rk.severity==='Critical'||rk.severity==='High'?'bh':rk.severity==='Medium'?'bm':'bl'}">${rk.severity}</span><span class="badge bn">${rk.category}</span><span class="risk-title">${esc(rk.title)}</span></div>
    <div class="risk-desc">${esc(rk.description)}</div>
    <div class="risk-rec"><i class="ti ti-bulb"></i>${esc(rk.recommendation)}</div>
    <div class="rc-meta"><span><i class="ti ti-user"></i>Owner: ${esc(rk.owner)}</span><span><i class="ti ti-clock"></i>${esc(rk.timeline)}</span><span><i class="ti ti-trending-up"></i>Likelihood: ${rk.likelihood}</span></div>
  </div>`).join('');

  const checklist=(r.compliance_checklist||[]).map(c=>`<div class="result-card" style="padding:10px 14px"><div style="display:flex;align-items:flex-start;gap:10px"><span class="badge ${c.status==='Required'?'bh':c.status==='Recommended'?'bm':'bl'}">${c.status}</span><div><div style="font-size:13px;font-weight:500;color:var(--g800)">${esc(c.item)}</div><div style="font-size:12px;color:var(--g400);margin-top:2px">${esc(c.regulation)} · ${esc(c.action)}</div></div></div></div>`).join('');

  const hitl=(r.hitl_requirements||[]).map(h=>`<div class="result-card"><div class="rc-title"><i class="ti ti-user-check" style="color:var(--amber)"></i>${esc(h.scenario)}</div><div class="rc-body">${esc(h.rationale)}</div><div class="rc-meta"><span><i class="ti ti-eye"></i>Oversight type: ${h.oversight_type}</span></div></div>`).join('');

  const framework=(r.governance_framework||[]).map(f=>`<div class="result-card">
    <div class="rc-title"><span class="badge ${f.priority==='High'?'bh':f.priority==='Medium'?'bm':'bl'}">${f.priority}</span>${esc(f.pillar)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
      <div><div style="font-size:11px;color:var(--g400);margin-bottom:3px">CURRENT STATE</div><div class="rc-body">${esc(f.current_state)}</div></div>
      <div><div style="font-size:11px;color:var(--teal);margin-bottom:3px">TARGET STATE</div><div class="rc-body">${esc(f.target_state)}</div></div>
    </div></div>`).join('');

  return `
  <div class="result-card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:16px">
      <div style="text-align:center"><div style="font-family:'Sora',sans-serif;font-size:46px;font-weight:700;color:${c2(sc)};line-height:1">${sc}</div><div style="font-size:11px;color:var(--g400)">Governance Score</div></div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px;color:var(--g800);margin-bottom:4px">Audit Readiness: ${r.audit_readiness?.score||0}/100</div>
        <div style="font-size:13px;color:var(--g500)">Gaps: ${(r.audit_readiness?.gaps||[]).join(' · ')}</div>
      </div>
    </div>
  </div>
  ${renderSection('Risk Register','ti-alert-triangle',risks)}
  ${renderSection('Compliance Checklist','ti-checkbox',checklist)}
  ${renderSection('Human-in-the-Loop Requirements','ti-user-check',hitl)}
  ${renderSection('Governance Framework','ti-shield-check',framework)}`;
}

/* --- Roadmap --- */
function renderRoadmapResult(r){
  const phases=(r.phases||[]).map(ph=>{
    const colors=['#1D9E75','#2563EB','#7C3AED'];
    const c=colors[(ph.phase-1)%3]||colors[0];
    return `<div class="result-card" style="border-top:3px solid ${c};margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#fff;flex-shrink:0">${ph.phase}</div>
        <div><div style="font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:var(--g900)">${esc(ph.name)}</div><div style="font-size:12px;color:var(--g400)">${esc(ph.timeline)} · ${esc(ph.theme)}</div></div>
      </div>
      ${(ph.milestones||[]).map(m=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--g100)">
        <i class="ti ti-circle-check" style="font-size:16px;color:${c};flex-shrink:0;margin-top:1px"></i>
        <div><div style="font-size:13px;font-weight:500;color:var(--g800)">${esc(m.milestone)}</div>
        <div style="font-size:12px;color:var(--g500);margin-top:2px">${esc(m.description)}</div>
        <div style="font-size:11px;color:var(--g400);margin-top:3px;display:flex;gap:9px"><span><i class="ti ti-user" style="font-size:12px"></i> ${esc(m.owner)}</span><span><i class="ti ti-calendar" style="font-size:12px"></i> ${esc(m.week)}</span><span><i class="ti ti-check" style="font-size:12px"></i> ${esc(m.success_criteria)}</span></div>
        </div></div>`).join('')}
    </div>`;

async function runAgent(vid){
  const s = agentState[vid];
  s.orgName = document.getElementById('f-orgName')?.value||s.orgName;
  s.industry = document.getElementById('f-industry')?.value||s.industry;
  s.aiStage = document.getElementById('f-aiStage')?.value||s.aiStage;
  s.departments = document.getElementById('f-departments')?.value||s.departments;
  s.transcript = document.getElementById('f-transcript')?.value||s.transcript;
  s.extraContext = document.getElementById('f-extra')?.value||s.extraContext||'';
  s.budget = document.getElementById('f-budget')?.value||s.budget||'';
  s.constraint = document.getElementById('f-constraint')?.value||s.constraint||'';
  s.agentConcept = document.getElementById('f-agent-concept')?.value||s.agentConcept||'';
  s.agentPurpose = document.getElementById('f-agent-purpose')?.value||s.agentPurpose||'';
  s.agentConstraints = document.getElementById('f-agent-constraints')?.value||s.agentConstraints||'';
  if(!s.industry||!s.size||!s.aiStage){ errMsg='Please fill in Industry, Size, and AI Stage.'; render(); return; }
  s.loading=true; errMsg=null; render();

  const msgs=LMSGS[vid]||['Analyzing...'];
  let mi=0; loadingInterval=setInterval(()=>{ mi=(mi+1)%msgs.length; const el=document.getElementById('lmsg'); if(el) el.textContent=msgs[mi]; },2200);

  const ag=AGENTS.find(a=>a.id===vid);
  const jdBlock=s.jds?.length>0?'\n\nJOB DESCRIPTIONS:\n'+s.jds.map(j=>`Role: ${j.role}\nDept: ${j.department||'N/A'}\n${j.text}`).join('\n\n---\n\n'):'';

  // Include results from other agents if available
  const ctx = [];
  if(vid!=='assess' && DB.getResult('assess')){ const ar=DB.getResult('assess').data; ctx.push(`READINESS ASSESSMENT CONTEXT: Overall score ${ar.readiness_scores?.overall||0}/100. Tier: ${ar.org_tier}. Gaps: ${(ar.key_gaps||[]).join(', ')}.`); }
  if(vid==='roadmap' && DB.getResult('agents')){ const ar=DB.getResult('agents').data; ctx.push(`AGENT PORTFOLIO CONTEXT: ${(ar.recommended_agents||[]).map(a=>a.name).join(', ')}`); }

  const builderCtx = vid==='builder' ? ('\n\nAGENT TO BUILD:\nConcept: '+(s.agentConcept||'not specified')+'\nPurpose: '+(s.agentPurpose||'not specified')+'\nConstraints: '+(s.agentConstraints||'none')) : '';
  const userParts = [
    'Organization: '+(s.orgName||'(unnamed)'),
    'Industry: '+s.industry+' | Size: '+s.size+' | AI Stage: '+s.aiStage,
    'Goal: '+(s.goal||'not specified')+' | Departments: '+(s.departments||'not specified'),
    'Pain Points: '+(s.painPoints.join(', ')||'none'),
    'Regulatory: '+(s.regulations.join(', ')||'none'),
    s.extraContext?'Additional context: '+s.extraContext:'',
    s.budget?'Budget: '+s.budget:'',
    s.constraint?'Primary constraint: '+s.constraint:'',
    ctx.join('\n'),
    jdBlock,
    s.transcript?'\nTRANSCRIPT/NOTES:\n'+s.transcript.substring(0,4000):'',
    builderCtx
  ];
  const user = userParts.filter(Boolean).join('\n');

  try{
    const txt = await callAI(ag.system, user);
    const bt=String.fromCharCode(96); const parsed=JSON.parse(txt.replace(new RegExp(bt+bt+bt+'json|'+bt+bt+bt,'g'),'').trim());
    const stored={data:parsed,orgName:s.orgName,industry:s.industry,size:s.size,aiStage:s.aiStage,painPoints:s.painPoints,regulations:s.regulations,jds:s.jds,departments:s.departments,date:new Date().toISOString()};
    const saveResp=await DB.saveAssessment(vid,ag?.name||vid,s.orgName,s.industry,s.size,s.aiStage,DB.currentUser,parsed,{painPoints:s.painPoints,regulations:s.regulations,departments:s.departments});
    if(saveResp?.error&&saveResp.error!=='No Supabase connection') console.warn('Save:',saveResp.error);
    clearInterval(loadingInterval);
    s.loading=false; s.result=stored;
    render();
  }catch(e){
    clearInterval(loadingInterval);
    s.loading=false;
    errMsg='Error: '+(e.message||'Unknown')+'  —  Check your API key in Settings.';
    render();
  }
}

function timeAgo(dateStr){
  const d=new Date(dateStr), now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  if(diff<604800) return Math.floor(diff/86400)+'d ago';
  return fmtDate(dateStr);
}

  html += `<div class="dash-filters">
    <span style="font-size:12px;color:var(--g500);margin-right:2px">Show:</span>
    <button class="filter-btn ${!historyFilter.agentId?'active':''}" onclick="setDashFilter('agentId',null)">All Agents</button>
    ${activeAgentIds.map(a=>`
      <button class="filter-btn ${historyFilter.agentId===a?'active':''}" style="${historyFilter.agentId===a?`background:${AG_COLORS[a]};border-color:${AG_COLORS[a]}`:''}"
        onclick="setDashFilter('agentId','${a}')">
        <i class="ti ${AG_ICONS[a]||'ti-file'}" style="font-size:12px"></i> ${AG_SHORT[a]||a}
        <span style="opacity:.7">${data.filter(d=>d.agent_id===a).length}</span>
      </button>`).join('')}
    <span style="font-size:12px;color:var(--g500);margin-left:6px">Member:</span>
    <button class="filter-btn ${!historyFilter.runBy?'active':''}" onclick="setDashFilter('runBy',null)">Everyone</button>
    ${members.map(m=>`<button class="filter-btn ${historyFilter.runBy===m?'active':''}" onclick="setDashFilter('runBy','${esc(m)}')">${esc(m.split(' ')[0])}</button>`).join('')}
  </div>`;

  // Filter data
  let filtered = data;
  if(historyFilter.agentId) filtered = filtered.filter(d=>d.agent_id===historyFilter.agentId);
  if(historyFilter.runBy) filtered = filtered.filter(d=>d.run_by===historyFilter.runBy);

  // Group by org
  const grouped = {};
  filtered.forEach(item=>{
    const k=item.org_name||'(unnamed)';
    if(!grouped[k]) grouped[k]=[];
    grouped[k].push(item);
  });

  if(!Object.keys(grouped).length){
    html += `<div class="dash-empty"><i class="ti ti-filter"></i><p>No results match the current filter.</p></div>`;
    return html;
  }

  // Org cards
  html += `<div class="sec-lbl" style="margin-bottom:10px">Organizations (${Object.keys(grouped).length})</div>
  <div class="dash-grid">`;

  Object.entries(grouped).forEach(([org, items])=>{
    // Get agents with data for this org (filtered)
    const orgAgentIds = [...new Set(items.map(i=>i.agent_id))].filter(Boolean);
    const lastRun = items[0];
    const assessItem = items.find(i=>i.agent_id==='assess');
    const score = assessItem?.results?.readiness_scores?.overall;
    const industry = lastRun?.industry||'';
    const size = lastRun?.size||'';
    const runners = [...new Set(items.map(i=>i.run_by))].filter(Boolean);

    const scoreHtml = score!=null ? `
      <div class="score-chip" style="background:${scoreColor(score)}18;color:${scoreColor(score)};border:2px solid ${scoreColor(score)}33">
        ${score}
      </div>` : `<div style="width:42px;height:42px;border-radius:50%;background:var(--g50);border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--g400)">N/A</div>`;

    html += `<div class="org-card" onclick="drillOrg('${esc(org)}')">
      <div class="org-card-top">
        <div>
          <div class="org-card-name">${esc(org)}</div>
          <div class="org-card-meta">${esc(industry)}${size?' · '+esc(size)+' org':''}</div>
        </div>
        ${scoreHtml}
      </div>
      <div class="agent-coverage">
        ${orgAgentIds.map(a=>{
          const c=AG_COLORS[a]||'#888';
          const cnt=items.filter(i=>i.agent_id===a).length;
          return `<div class="ac-pill done" style="background:${c}15;color:${c};border-color:${c}33"
            onclick="event.stopPropagation();drillOrgAgent('${esc(org)}','${a}')">
            <i class="ti ${AG_ICONS[a]||'ti-file'}" style="font-size:11px"></i>${AG_SHORT[a]||a}${cnt>1?` <span style="opacity:.6">${cnt}</span>`:''}
          </div>`;
        }).join('')}
      </div>
      <div class="ac-who">
        ${runners.map(r=>{const m=getTeamMembers().find(t=>t.name===r);const c=m?.color||'#888';const init=m?.initials||(r||'?').substring(0,2).toUpperCase();return `<div class="team-avatar" style="background:${c}22;color:${c};width:22px;height:22px;font-size:9px" title="${esc(r)}">${init}</div>`;}).join('')}
        <span style="margin-left:4px">${timeAgo(lastRun.created_at)}</span>
      </div>
    </div>`;
  });

  html += `</div>`;

  // Bottom row: recent activity + agent breakdown
  html += `<div class="dash-two">
    <div class="dash-panel">
      <div class="dash-panel-title"><i class="ti ti-activity"></i>Recent Activity</div>
      ${data.slice(0,8).map(item=>{
        const m=getTeamMembers().find(t=>t.name===item.run_by);
        const col=m?.color||'#6B7280';
        const init=m?.initials||(item.run_by||'?').substring(0,2).toUpperCase();
        const c=AG_COLORS[item.agent_id]||'var(--g300)';
        return `<div class="activity-item">
          <div class="team-avatar" style="background:${col}22;color:${col};font-size:9px">${init}</div>
          <div style="width:26px;height:26px;border-radius:var(--rsm);background:${c}18;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ${AG_ICONS[item.agent_id]||'ti-file'}" style="font-size:13px;color:${c}"></i></div>
          <div class="ai-text">
            <div class="ai-title">${esc(item.org_name||'(unnamed)')} — ${AG_SHORT[item.agent_id]||item.agent_id}</div>
            <div class="ai-sub">${esc(item.run_by||'Unknown')} · ${timeAgo(item.created_at)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-panel">
      <div class="dash-panel-title"><i class="ti ti-robot"></i>Agent Usage</div>
      ${activeAgentIds.map(a=>{
        const cnt=data.filter(d=>d.agent_id===a).length;
        const pct=Math.round((cnt/data.length)*100);
        const c=AG_COLORS[a]||'var(--g300)';
        return `<div class="agent-bar-row">
          <div class="agent-bar-label"><i class="ti ${AG_ICONS[a]}" style="font-size:12px;color:${c};margin-right:4px"></i>${AG_SHORT[a]}</div>
          <div class="agent-bar-bg"><div class="agent-bar-fill" style="width:${pct}%;background:${c}"></div></div>
          <div class="agent-bar-count">${cnt}</div>
        </div>`;
      }).join('')}
      ${AGENTS.filter(a=>!activeAgentIds.includes(a.id)).length>0?`
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--g100);font-size:11px;color:var(--g400)">
        Not yet run: ${AGENTS.filter(a=>!activeAgentIds.includes(a.id)).map(a=>AG_SHORT[a.id]).join(', ')}
      </div>`:''}
    </div>
  </div>`;

  return html;
}

function setDashFilter(key, val){
  historyFilter[key]=val;
  render();
}

function drillOrg(orgName){
  dashOrgFilter=orgName;
  view='teamdash';
  render();
}

function drillOrgAgent(orgName, agentId){
  // Load the specific result and view it
  const item = historyData.find(d=>(d.org_name||'(unnamed)')===orgName && d.agent_id===agentId);
  if(!item) return;
  viewFromHistory(agentId, item.results||{});
}

function renderOrgDetail(orgName){
  const items = historyData.filter(d=>(d.org_name||'(unnamed)')===orgName);
  if(!items.length) return `<div class="empty"><i class="ti ti-building"></i><p>No results found for this organization.</p></div>`;

  const industry = items[0]?.industry||'';
  const size = items[0]?.size||'';
  // Only agent IDs that have data for this org
  const orgAgentIds = [...new Set(items.map(i=>i.agent_id))].filter(Boolean);
  const assessItem = items.find(i=>i.agent_id==='assess');
  const score = assessItem?.results?.readiness_scores?.overall;

  let html = `
  <button class="btn btn-s btn-sm" style="margin-bottom:16px" onclick="dashOrgFilter=null;render()">
    <i class="ti ti-arrow-left"></i> Back to Dashboard
  </button>
  <div class="od-header">
    <div class="od-icon"><i class="ti ti-building"></i></div>
    <div style="flex:1">
      <div class="od-name">${esc(orgName)}</div>
      <div class="od-meta">${esc(industry)}${size?' · '+esc(size)+' organization':''} · ${items.length} agent run${items.length!==1?'s':''}</div>
    </div>
    ${score!=null?`<div class="score-chip" style="background:rgba(255,255,255,.15);color:#fff;font-size:22px">${score}<div style="font-size:10px;font-weight:400;opacity:.6;text-align:center">/ 100</div></div>`:''}
  </div>
  <div style="margin-bottom:16px">
    <div class="sec-lbl" style="margin-bottom:10px">Agent Results (${orgAgentIds.length} of 5 run)</div>`;

  // Agent coverage summary — ONLY show agents with data
  html += `<div class="agent-coverage" style="margin-bottom:16px">
    ${orgAgentIds.map(a=>{
      const c=AG_COLORS[a]||'#888';
      const cnt=items.filter(i=>i.agent_id===a).length;
      return `<div class="ac-pill done" style="background:${c}15;color:${c};border-color:${c}33;cursor:pointer" onclick="scrollTo(0,document.getElementById('arc-${a}')?.offsetTop-80)">
        <i class="ti ${AG_ICONS[a]||'ti-file'}" style="font-size:11px"></i>${AG_SHORT[a]}${cnt>1?` (${cnt})`:''}</div>`;
    }).join('')}
    ${AGENTS.filter(a=>!orgAgentIds.includes(a.id)).map(a=>`
      <div class="ac-pill" style="background:var(--g50);color:var(--g400);border-color:var(--g200);opacity:.6">
        <i class="ti ${AG_ICONS[a.id]||'ti-file'}" style="font-size:11px"></i>${AG_SHORT[a.id]} <span style="font-size:10px">not run</span></div>`).join('')}
  </div></div>`;

  // Each agent that has results — expanded by default
  orgAgentIds.forEach(agId=>{
    const agItems = items.filter(i=>i.agent_id===agId).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const ag = AGENTS.find(a=>a.id===agId);
    const c = AG_COLORS[agId]||'#888';

    agItems.forEach((item,idx)=>{
      const r = item.results||{};
      const m = getTeamMembers().find(t=>t.name===item.run_by);
      const col = m?.color||'#6B7280';
      const init = m?.initials||(item.run_by||'?').substring(0,2).toUpperCase();

      // Build summary based on agent type
      let summaryHtml = '';
      let scoresHtml = '';
      if(agId==='assess' && r.readiness_scores){
        const s=r.readiness_scores;
        summaryHtml = r.org_summary||r.executive_summary||'';
        scoresHtml = `<div class="arc-scores">
          ${[{k:'overall',l:'Overall'},{k:'data_maturity',l:'Data'},{k:'governance_maturity',l:'Governance'},{k:'process_maturity',l:'Process'},{k:'ai_maturity',l:'AI'},{k:'workforce_readiness',l:'Workforce'}].map(d=>{
            const v=s[d.k]; if(v==null) return '';
            return `<div class="arc-score-chip" style="background:${scoreColor(v)}18;color:${scoreColor(v)}">${d.l}: ${v}</div>`;
          }).join('')}
        </div>`;
      } else if(agId==='prompts'){
        const cats=r.categories||[];
        summaryHtml=r.overview||'';
        scoresHtml=cats.length?`<div class="arc-scores">${cats.map(c=>`<div class="arc-score-chip" style="background:var(--purpleL);color:var(--purple)">${esc(c.category)} (${(c.prompts||[]).length})</div>`).join('')}</div>`:'';
      } else if(agId==='govern'){
        summaryHtml=r.governance_summary||'';
        const risks=r.risk_register||[];
        if(risks.length) scoresHtml=`<div class="arc-scores">${[...new Set(risks.map(r=>r.severity))].map(sev=>{const cnt=risks.filter(r=>r.severity===sev).length;const c=sev==='Critical'||sev==='High'?'var(--red)':sev==='Medium'?'var(--amber)':'var(--teal)';return `<div class="arc-score-chip" style="background:${c}18;color:${c}">${cnt} ${sev}</div>`;}).join('')}</div>`;
      } else if(agId==='agents'){
        summaryHtml=r.portfolio_summary||'';
        const ags=r.recommended_agents||[];
        if(ags.length) scoresHtml=`<div class="arc-scores">${ags.slice(0,5).map(a=>`<div class="arc-score-chip" style="background:var(--redL);color:var(--red)">${esc(a.name)}</div>`).join('')}${ags.length>5?`<div class="arc-score-chip" style="background:var(--g100);color:var(--g400)">+${ags.length-5} more</div>`:''}</div>`;
      } else if(agId==='roadmap'){
        summaryHtml=r.roadmap_summary||'';
        const phases=r.phases||[];
        if(phases.length) scoresHtml=`<div class="arc-scores">${phases.map(p=>`<div class="arc-score-chip" style="background:var(--blueL);color:var(--blue)">Phase ${p.phase}: ${esc(p.name)}</div>`).join('')}</div>`;
      }

      html += `<div class="agent-result-card" id="arc-${agId}${idx>0?'-'+idx:''}">
        <div class="arc-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div class="arc-icon" style="background:${c}15"><i class="ti ${AG_ICONS[agId]||'ti-file'}" style="font-size:17px;color:${c}"></i></div>
          <div style="flex:1">
            <div class="arc-title">${ag?.name||agId}</div>
            <div class="arc-meta">
              <span style="display:inline-flex;align-items:center;gap:4px">
                <span style="display:inline-flex;width:18px;height:18px;border-radius:50%;background:${col}22;color:${col};font-size:8px;font-weight:600;align-items:center;justify-content:center">${init}</span>
                ${esc(item.run_by||'Unknown')}
              </span> &nbsp;·&nbsp; ${fmtDate(item.created_at)}
            </div>
          </div>
          <div style="display:flex;gap:7px;align-items:center">
            <button class="btn btn-p btn-sm" onclick="event.stopPropagation();viewFromHistory('${agId}',${JSON.stringify(item.results||{})})"><i class="ti ti-eye"></i> Full Result</button>
            <i class="ti ti-chevron-down" style="font-size:16px;color:var(--g300)"></i>
          </div>
        </div>
        <div class="arc-body">
          ${summaryHtml?`<div class="arc-summary">${esc(summaryHtml)}</div>`:''}
          ${scoresHtml}
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-p btn-sm" onclick="viewFromHistory('${agId}',${JSON.stringify(item.results||{})})"><i class="ti ti-eye"></i> View Full Result</button>
            <button class="btn btn-s btn-sm" onclick='exportRaw(${JSON.stringify(item)})'><i class="ti ti-download"></i> Export</button>
          </div>
        </div>
      </div>`;
    });
  });

  // Not-yet-run agents
  const notRun = AGENTS.filter(a=>!orgAgentIds.includes(a.id));
  if(notRun.length){
    html += `<div style="margin-top:6px"><div class="sec-lbl" style="margin-bottom:8px">Not yet run for this organization</div>
    ${notRun.map(a=>`
      <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1px dashed var(--g200);border-radius:var(--rmd);margin-bottom:7px;opacity:.6">
        <div class="arc-icon" style="background:var(--g50);width:32px;height:32px"><i class="ti ${a.icon}" style="font-size:15px;color:var(--g300)"></i></div>
        <div style="flex:1;font-size:13px;color:var(--g400)">${a.name}</div>
        <button class="btn btn-s btn-sm" onclick="go('${a.id}')"><i class="ti ti-plus"></i> Run Now</button>
      </div>`).join('')}
    </div>`;
  }

  return html;
}


/* ==================== TEAM MANAGER ==================== */
const MEMBER_COLORS = ['#1D9E75','#7C3AED','#2563EB','#D97706','#DC2626','#0891B2','#DB2777','#6B7280','#059669','#9333EA','#EA580C','#0284C7'];

function getTeamMembers(){
  try{
    const stored = localStorage.getItem('hub_team');
    if(stored){
      const parsed = JSON.parse(stored);
      if(Array.isArray(parsed) && parsed.length) return parsed;
    }
  }catch(e){ localStorage.removeItem('hub_team'); }
  return TEAM_MEMBERS;
}

function saveTeamMembers(members){
  localStorage.setItem('hub_team', JSON.stringify(members));
}

function renderTeamManager(){
  if(!DB.isAdmin) return `<div class="info-box"><i class="ti ti-lock"></i>Only admins can manage team members.</div>`;
  const members = getTeamMembers();
  const colorPicker = MEMBER_COLORS.map((c,i)=>`<div class="color-dot" style="background:${c}" onclick="pickColor(${i},'${c}')" title="${c}"></div>`).join('');

  return `
  <div style="margin-bottom:10px;font-size:13px;color:var(--g500);line-height:1.6">
    Edit names, roles, and initials directly. Changes save instantly to your browser and apply to everyone on this device. To update all team members, share the updated file.
  </div>
  <div id="teamMemberList">
    ${members.map((m,i)=>renderMemberRow(m,i,members.length)).join('')}
  </div>
  <div class="add-member-row" onclick="addMember()"><i class="ti ti-plus" style="font-size:16px;margin-bottom:3px;display:block"></i>Add Team Member</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-p btn-sm" onclick="saveTeamEdits()"><i class="ti ti-check"></i> Save Changes</button>
    <button class="btn btn-s btn-sm" onclick="resetTeamToDefault()"><i class="ti ti-refresh"></i> Reset to Default</button>
  </div>`;
}

function renderMemberRow(m, i, total){
  const adminBadge = m.admin ? '<span class="badge bt" style="font-size:10px;flex-shrink:0">Admin</span>' : '';
  const actionBtn = !m.admin ? '<button class="btn btn-g btn-sm" style="color:var(--red);flex-shrink:0" onclick="removeMember('+i+')" title="Remove"><i class="ti ti-trash" style="font-size:14px"></i></button>' : '<div style="width:32px"></div>';
  return `<div class="tm-row" id="tmrow-${i}">
    <div class="tm-avatar" style="background:${m.color}22;color:${m.color}" onclick="cycleMemberColor(${i})" title="Click to change color">${m.initials||'?'}</div>
    <div class="tm-fields">
      <input class="tm-name" type="text" placeholder="Full name" value="${esc(m.name||'')}" id="tm-name-${i}">
      <input class="tm-role" type="text" placeholder="Title / Role" value="${esc(m.role||'')}" id="tm-role-${i}">
      <input class="tm-init" type="text" placeholder="XX" maxlength="2" value="${esc(m.initials||'')}" id="tm-init-${i}">
    </div>
    ${adminBadge}${actionBtn}
  </div>`;
}

function cycleMemberColor(i){
  const members = getTeamMembers();
  const current = members[i].color;
  const idx = MEMBER_COLORS.indexOf(current);
  members[i].color = MEMBER_COLORS[(idx+1)%MEMBER_COLORS.length];
  saveTeamMembers(members);
  // Refresh just the avatar
  const avatar = document.querySelector('#tmrow-'+i+' .tm-avatar');
  if(avatar){ avatar.style.background=members[i].color+'22'; avatar.style.color=members[i].color; avatar.textContent=members[i].initials; }
}

function saveTeamEdits(){
  const members = getTeamMembers();
  members.forEach((m,i)=>{
    const name = document.getElementById('tm-name-'+i)?.value?.trim();
    const role = document.getElementById('tm-role-'+i)?.value?.trim();
    const init = document.getElementById('tm-init-'+i)?.value?.trim().toUpperCase();
    if(name) m.name=name;
    if(role) m.role=role;
    if(init) m.initials=init;
  });
  saveTeamMembers(members);
  showToast('Team saved');
  render();
}

function addMember(){
  const members = getTeamMembers();
  const colors = MEMBER_COLORS.filter(c=>!members.map(m=>m.color).includes(c));
  members.splice(members.length-1, 0, {
    name:'New Member', role:'Role', initials:'NM',
    color: colors[0]||MEMBER_COLORS[Math.floor(Math.random()*MEMBER_COLORS.length)]
  });
  saveTeamMembers(members);
  render();
}

function removeMember(i){
  const members = getTeamMembers();
  if(!confirm('Remove '+members[i].name+'?')) return;
  members.splice(i,1);
  saveTeamMembers(members);
  render();
}

function resetTeamToDefault(){
  if(!confirm('Reset team to default list? Custom changes will be lost.')) return;
  localStorage.removeItem('hub_team');
  showToast('Team reset to default');
  render();
}
